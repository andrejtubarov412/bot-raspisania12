{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<h1 style="font-size: 2rem; font-weight: 700;">🔑 Вход</h1>
<form method="POST" action="{{ url_for('login') }}" style="max-width: 400px;">
    <div class="form-group">
        <label for="username">Логин</label>
        <input type="text" id="username" name="username" required placeholder="Введите логин">
    </div>
    <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" required placeholder="Введите пароль">
    </div>
    <div class="flex">
        <button type="submit" class="btn btn-success">Войти</button>
        <a href="{{ url_for('register') }}" class="btn btn-secondary">Регистрация</a>
    </div>
</form>
{% endblock %}
