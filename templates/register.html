{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<h1 style="font-size: 2rem; font-weight: 700;">📝 Регистрация</h1>
<form method="POST" action="{{ url_for('register') }}" style="max-width: 400px;">
    <div class="form-group">
        <label for="username">Логин</label>
        <input type="text" id="username" name="username" required placeholder="Придумайте логин">
    </div>
    <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" required placeholder="Придумайте пароль">
    </div>
    <div class="form-group">
        <label for="full_name">Полное имя</label>
        <input type="text" id="full_name" name="full_name" placeholder="Как вас называть (опционально)">
    </div>
    <div class="flex">
        <button type="submit" class="btn btn-success">Зарегистрироваться</button>
        <a href="{{ url_for('login') }}" class="btn btn-secondary">Уже есть аккаунт? Войти</a>
    </div>
</form>
{% endblock %}
