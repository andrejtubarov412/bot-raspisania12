<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Расписание{% endblock %}</title>
    <style>
        /* ---------- Базовые стили ---------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f7fc; min-height: 100vh; padding: 20px; display: flex; justify-content: center; align-items: flex-start; }
        .container { max-width: 1200px; width: 100%; margin: 0 auto; }
        .card { background: #fff; padding: 25px 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); margin-bottom: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eef2f7; }
        .header h1 { font-size: 1.8rem; color: #1a5fb4; margin: 0; }
        .user-info { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .user-name { font-weight: 600; color: #1a5fb4; }
        .user-role { font-size: 0.8rem; padding: 2px 10px; background: #e8edf5; border-radius: 20px; color: #2c3e50; }
        .btn { display: inline-block; padding: 8px 18px; border-radius: 30px; font-size: 0.9rem; font-weight: 500; text-decoration: none; border: none; cursor: pointer; text-align: center; transition: 0.2s; }
        .btn-primary { background: #1a5fb4; color: #fff; }
        .btn-primary:hover { background: #0e4a8f; }
        .btn-success { background: #2d7d46; color: #fff; }
        .btn-success:hover { background: #1f5c33; }
        .btn-danger { background: #c13b3b; color: #fff; }
        .btn-danger:hover { background: #9e2d2d; }
        .btn-outline { background: transparent; color: #1a5fb4; border: 2px solid #1a5fb4; }
        .btn-outline:hover { background: #1a5fb4; color: #fff; }
        .btn-sm { padding: 5px 14px; font-size: 0.8rem; }
        .btn-block { width: 100%; padding: 12px; font-size: 1rem; }
        .flash { padding: 12px 20px; border-radius: 10px; margin-bottom: 16px; font-weight: 500; }
        .flash.success { background: #d4edda; color: #0b4d2c; border-left: 5px solid #2d7d46; }
        .flash.error { background: #f8d7da; color: #7f1d2b; border-left: 5px solid #c13b3b; }
        .back-link { display: inline-block; margin-bottom: 16px; color: #1a5fb4; text-decoration: none; font-weight: 500; }
        .back-link:hover { text-decoration: underline; }
        h2 { font-size: 1.4rem; font-weight: 600; color: #1e2a3a; margin: 24px 0 16px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; margin: 20px 0 24px; }
        .stat-item { background: #f8faff; padding: 18px 12px; text-align: center; border-radius: 14px; border: 1px solid #e8edf5; }
        .stat-number { font-size: 2.2rem; font-weight: 700; color: #1a5fb4; }
        .stat-label { font-size: 0.85rem; color: #4a5a6e; margin-top: 4px; }
        .main-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 18px; margin: 24px 0 10px; }
        .menu-card { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 12px; background: #fff; border-radius: 16px; border: 1px solid #e8edf5; text-decoration: none; color: #1e2a3a; transition: 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .menu-card:hover { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(26,95,180,0.10); border-color: #1a5fb4; }
        .menu-icon { font-size: 2.6rem; margin-bottom: 8px; }
        .menu-label { font-weight: 600; font-size: 1rem; }

        /* ---------- АДАПТИВНЫЕ ТАБЛИЦЫ ---------- */
        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 1rem;
        }
        .table-responsive table {
            min-width: 600px;
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }
        .table-responsive th {
            background: #e8edf5;
            color: #1e2a3a;
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
        }
        .table-responsive td {
            padding: 12px 16px;
            border-bottom: 1px solid #eef2f7;
        }
        .table-responsive tr:hover {
            background: #f8faff;
        }
        .shift-badge {
            display: inline-block;
            padding: 2px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .shift-утро { background: #fef3d7; color: #8a6d0b; }
        .shift-день { background: #dbeafe; color: #1a4f8b; }
        .shift-вечер { background: #d1f0f5; color: #0b5e6b; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 5px; color: #1e2a3a; }
        .form-group input, .form-group select { width: 100%; padding: 12px 16px; border: 1px solid #d0d9e6; border-radius: 10px; font-size: 1rem; background: #fafcff; transition: 0.2s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #1a5fb4; box-shadow: 0 0 0 3px rgba(26,95,180,0.15); }

        /* ---------- МЕДИА-ЗАПРОСЫ ДЛЯ МОБИЛЬНЫХ ---------- */
        @media (max-width: 768px) {
            .container { padding: 0 8px; }
            .card { padding: 18px; }
            .header h1 { font-size: 1.4rem; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .main-menu { grid-template-columns: 1fr 1fr; gap: 12px; }
            .table-responsive table { font-size: 0.8rem; }
            .table-responsive th, .table-responsive td { padding: 6px 4px; }
            /* Скрываем колонку "Смена" на телефонах, если она есть */
            .table-responsive .shift-column { display: none; }
        }
        @media (max-width: 480px) {
            .header { flex-direction: column; align-items: flex-start; }
            .user-info { width: 100%; justify-content: flex-start; }
            .stats-grid { grid-template-columns: 1fr; }
            .main-menu { grid-template-columns: 1fr; }
            .btn { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>📋 Расписание</h1>
                <div class="user-info">
                    {% if user %}
                        <span class="user-name">👤 {{ user.full_name }}</span>
                        <span class="user-role">{{ user.role }}</span>
                        <a href="{{ url_for('logout') }}" class="btn btn-danger btn-sm">🚪 Выйти</a>
                    {% else %}
                        <a href="{{ url_for('login') }}" class="btn btn-primary btn-sm">🔑 Войти</a>
                        <a href="{{ url_for('register') }}" class="btn btn-success btn-sm">📝 Регистрация</a>
                    {% endif %}
                </div>
            </div>
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
